services:
  - type: web
    name: studybuddy-exam-prep
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0
    disk:
      name: studybuddy-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o
      - key: OPENAI_VISION_MODEL
        value: gpt-4o-mini
      - key: DB_PATH
        value: /var/data/app.db
